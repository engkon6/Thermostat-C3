name: Compile Thermostat Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Configure arduino-cli
        run: |
          ./bin/arduino-cli config init
          ./bin/arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          ./bin/arduino-cli core update-index
          ./bin/arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          ./bin/arduino-cli lib install "WiFiManager" "ArduinoJson" "PubSubClient" "ESP8266 and ESP32 OLED driver for SSD1306 displays"

      - name: Compile Sketch
        run: |
          ./bin/arduino-cli compile --fqbn esp32:esp32:lolin_c3_pico --output-dir ./build ./Thermostat_29

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: thermostat-firmware
          path: ./build/*.bin
